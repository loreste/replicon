name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Lint
        continue-on-error: true
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Unit tests with race detector
        run: make test-race

      - name: Build
        run: make build

      - name: Benchmarks
        run: make bench

  integration:
    runs-on: ubuntu-latest
    services:
      primary:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: postgres
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: make build

      - name: Validate sample config
        env:
          REPLICON_PRIMARY_DSN: "postgres://postgres:testpass@127.0.0.1:5432/postgres?sslmode=disable"
          REPLICON_STANDBY_DSN: "postgres://postgres:testpass@127.0.0.1:5432/postgres?sslmode=disable"
        run: |
          bin/replicon init -mode master-slave > /tmp/replicon-ci.json
          bin/replicon validate -config /tmp/replicon-ci.json
          bin/replicon plan -config /tmp/replicon-ci.json
          bin/replicon render -config /tmp/replicon-ci.json -target primary
          bin/replicon render -config /tmp/replicon-ci.json -target standby

      - name: Run integration tests (connectivity and probe table)
        env:
          REPLICON_PRIMARY_DSN: "postgres://postgres:testpass@127.0.0.1:5432/postgres?sslmode=disable"
        run: |
          go test -race -tags integration -count=1 -v -run 'TestIntegrationConnect|TestIntegrationValidate|TestIntegrationProbeTable' ./internal/replication/

      - name: Verify PostgreSQL is queryable
        env:
          PGPASSWORD: testpass
        run: |
          psql -h 127.0.0.1 -p 5432 -U postgres -c "SELECT version();"
          psql -h 127.0.0.1 -p 5432 -U postgres -c "SHOW wal_level;"
